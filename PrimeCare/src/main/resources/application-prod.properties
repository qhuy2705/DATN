# =====================
# APP JWT
# =====================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.accessTokenMinutes=15
app.jwt.refreshTokenDays=14

# =====================
# REFRESH COOKIE
# =====================
app.security.refreshCookie.name=rt
app.security.refreshCookie.path=/api/auth/refresh
app.security.refreshCookie.legacyPath=/api/auth
app.security.refreshCookie.sameSite=Strict
app.security.refreshCookie.secure=true
app.security.refreshCookie.domain=${APP_COOKIE_DOMAIN}

# =====================
# QR SECRET
# =====================
app.qr.secret=${APP_QR_SECRET}

# =====================
# RABBITMQ
# =====================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# =====================
# MAIL
# =====================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.mail.from-address=${MAIL_FROM_ADDRESS:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:H\u1EC7 th\u1ED1ng y t\u1EBF PrimeCare}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:8000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:8000}

# =====================
# DATASOURCE
# =====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =====================
# REDIS
# =====================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# =====================
# JPA
# =====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =====================
# SERVER
# =====================
server.port=${SERVER_PORT}
app.websocket.allowedOriginPatterns=${APP_ALLOWED_ORIGIN_PATTERNS}
app.cors.allowed-origin-patterns=${APP_ALLOWED_ORIGIN_PATTERNS}
app.rate-limit.trusted-proxies=${APP_RATE_LIMIT_TRUSTED_PROXIES:}

app.s3.region=${AWS_REGION}
app.s3.bucket=${AWS_S3_BUCKET}
app.s3.access-key=${AWS_ACCESS_KEY_ID}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
app.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}
app.upload.max-avatar-size=5242880
app.upload.max-attachment-size=10485760

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================
# NOTIFICATION SCHEDULER
# =====================
app.notification.appointment-reminder-cron=${APP_APPOINTMENT_REMINDER_CRON:0 0 * * * *}

# =====================
# AI ASSISTANT (OPENAI-COMPATIBLE)
# =====================
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.chat-url=${APP_AI_CHAT_URL:https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.model=${APP_AI_MODEL:gemini-2.5-flash}
app.ai.temperature=${APP_AI_TEMPERATURE:0.2}
app.ai.timeout-seconds=${APP_AI_TIMEOUT_SECONDS:20}

# =====================
# SMS
# =====================
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.provider=${APP_SMS_PROVIDER}
app.sms.log-only=${APP_SMS_LOG_ONLY:false}
app.sms.from-number=${APP_SMS_FROM_NUMBER:}
app.sms.twilio-account-sid=${APP_SMS_TWILIO_ACCOUNT_SID:}
app.sms.twilio-auth-token=${APP_SMS_TWILIO_AUTH_TOKEN:}

# =====================
# PUBLIC LOOKUP OTP
# =====================
app.public-lookup.otp.ttl-seconds=${APP_PUBLIC_LOOKUP_OTP_TTL_SECONDS:300}
app.public-lookup.otp.resend-cooldown-seconds=${APP_PUBLIC_LOOKUP_OTP_RESEND_COOLDOWN_SECONDS:30}
app.public-lookup.otp.max-attempts=${APP_PUBLIC_LOOKUP_OTP_MAX_ATTEMPTS:5}
app.public-lookup.otp.access-token-ttl-minutes=${APP_PUBLIC_LOOKUP_ACCESS_TOKEN_TTL_MINUTES:15}

# =====================
# APPOINTMENT REQUEST LIFECYCLE
# =====================
app.appointment.request-expiry-cron=${APP_APPOINTMENT_REQUEST_EXPIRY_CRON:0 */15 * * * *}
app.appointment.claim.ttl-minutes=${APPOINTMENT_CLAIM_TTL_MINUTES:5}
app.appointment.claim.heartbeat-seconds=${APPOINTMENT_CLAIM_HEARTBEAT_SECONDS:60}
app.appointment.default-slot-capacity=${APPOINTMENT_DEFAULT_SLOT_CAPACITY:1}
app.appointment.no-show.grace-minutes=${APPOINTMENT_NO_SHOW_GRACE_MINUTES:10}
app.appointment.overdue-scan-cron=${APPOINTMENT_OVERDUE_SCAN_CRON:0 */5 * * * *}


# =====================
# AUTH CREDENTIAL SETUP
# =====================
app.auth.credential-token-minutes=${APP_AUTH_CREDENTIAL_TOKEN_MINUTES:30}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8081}
spring.flyway.enabled=${APP_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =====================
# BANK TRANSFER WEBHOOK
# =====================
app.billing.bank-transfer.webhook.secret=${APP_BANK_TRANSFER_WEBHOOK_SECRET:}
app.billing.bank-transfer.webhook.allowed-skew-seconds=${APP_BANK_TRANSFER_WEBHOOK_ALLOWED_SKEW_SECONDS:300}
