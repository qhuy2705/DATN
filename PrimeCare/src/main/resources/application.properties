spring.application.name=PrimeCare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
app.encounter.max-reopen-count=${APP_ENCOUNTER_MAX_REOPEN_COUNT:3}
app.file.local-storage-root=${APP_FILE_LOCAL_STORAGE_ROOT:${java.io.tmpdir}/primecare-storage}
app.mail.from-address=${MAIL_FROM_ADDRESS:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:H\u1EC7 th\u1ED1ng y t\u1EBF PrimeCare}
app.appointment.default-slot-capacity=${APPOINTMENT_DEFAULT_SLOT_CAPACITY:1}
app.appointment.no-show.grace-minutes=${APPOINTMENT_NO_SHOW_GRACE_MINUTES:10}
app.appointment.overdue-scan-cron=${APPOINTMENT_OVERDUE_SCAN_CRON:0 */5 * * * *}
app.booking-restriction.identity-pepper=${APP_BOOKING_RESTRICTION_IDENTITY_PEPPER:${app.jwt.secret:primecare_booking_restriction_dev_pepper_change_me}}
app.pharmacy.default-low-stock-threshold=${APP_PHARMACY_DEFAULT_LOW_STOCK_THRESHOLD:10}
